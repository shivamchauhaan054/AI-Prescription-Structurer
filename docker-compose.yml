services:
  backend:
    build:
      context: ./backend
    container_name: prescription-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    container_name: prescription-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
